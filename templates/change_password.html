{% extends "base.html" %} {% block title %}Alterar Senha{% endblock %} {% block
content %}
<div class="p-6">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-2xl font-bold text-gray-800">Alterar Senha</h2>
    <a
      href="{{ url_for('dashboard') }}"
      class="btn bg-gray-500 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded-lg flex items-center"
    >
      <i class="fas fa-arrow-left mr-2"></i> Voltar
    </a>
  </div>
  <div class="bg-white rounded-2xl shadow-sm p-6 max-w-md mx-auto">
    <form
      id="changePasswordForm"
      method="POST"
      action="{{ url_for('change_password') }}"
      autocomplete="off"
    >
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="mb-4 relative group">
        <label
          for="newPassword"
          class="block text-sm font-medium text-gray-700 mb-1"
          >Nova Senha</label
        >
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 transition-colors group-focus-within:text-primary">
            <i class="fas fa-lock"></i>
          </span>
          <input
            type="password"
            id="newPassword"
            name="newPassword"
            class="w-full px-10 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 outline-none"
            required
          />
          <button type="button" tabindex="-1"
            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-primary transition-colors"
            onclick="togglePassword('newPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div class="mb-4 relative group">
        <label
          for="confirmPassword"
          class="block text-sm font-medium text-gray-700 mb-1"
          >Confirmar Senha</label
        >
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 transition-colors group-focus-within:text-primary">
            <i class="fas fa-lock"></i>
          </span>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="w-full px-10 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 outline-none"
            required
          />
          <button type="button" tabindex="-1"
            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-primary transition-colors"
            onclick="togglePassword('confirmPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div class="flex justify-end">
        <button
          type="submit"
          class="btn bg-primary hover:bg-secondary text-white font-medium py-2 px-4 rounded-lg transition-all duration-200 shadow-md hover:scale-105"
        >
          Alterar Senha
        </button>
      </div>
    </form>
  </div>
</div>
<script>
function togglePassword(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const icon = btn.querySelector('i');
  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = "password";
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}
</script>
{% endblock %}
