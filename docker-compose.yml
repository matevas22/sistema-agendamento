version: "3.9"

services:
  nova-flask-app:
    build:
      context: .
    container_name: agendamento-flask-app
    command: gunicorn -c gunicorn.conf.py app:app
    ports:
      - "8001:8001"
    depends_on:
      - redis-nova
    environment:
      - FLASK_ENV=production
      - TZ=America/Sao_Paulo
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped

  redis-nova:
    image: redis:latest
    container_name: redis-nova
    ports:
      - "6380:6379"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./instance:/app/instance
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
